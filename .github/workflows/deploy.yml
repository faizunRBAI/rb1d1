name: Deploy

on:
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest flake8 black || true

      - name: Run tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v || true
          else
            echo "No tests directory found, skipping."
          fi

      - name: Lint (advisory)
        run: flake8 . --max-line-length=120 --extend-ignore=E203,W503 || true

        continue-on-error: true
      - name: Format check (advisory)
        run: black --check . || true

        continue-on-error: true
  provision:
    name: Provision
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      asg_name: ${{ steps.tf_outputs.outputs.asg_name }}
      alb_dns_name: ${{ steps.tf_outputs.outputs.alb_dns_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="db_name=rb1d1" \
            -var="db_username=appuser"

      - name: Capture Terraform outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          ASG_NAME=$(terraform output -raw asg_name)
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "asg_name=${ASG_NAME}" >> "$GITHUB_OUTPUT"
          echo "alb_dns_name=${ALB_DNS}" >> "$GITHUB_OUTPUT"

  configure:
    name: Configure
    runs-on: ubuntu-latest
    needs: [provision]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Install Ansible and dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3-pip
          pip install ansible boto3 botocore

      - name: Wait for instances to register with SSM
        run: |
          ASG_NAME="${{ needs.provision.outputs.asg_name }}"
          echo "Waiting for instances in ASG: ${ASG_NAME}"
          MAX_WAIT=600
          ELAPSED=0
          INTERVAL=20
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "${ASG_NAME}" \
              --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
              --output text)
            if [ -n "${INSTANCE_IDS}" ]; then
              echo "Found instances: ${INSTANCE_IDS}"
              SSM_READY=true
              for INST in ${INSTANCE_IDS}; do
                STATUS=$(aws ssm describe-instance-information \
                  --filters "Key=InstanceIds,Values=${INST}" \
                  --query "InstanceInformationList[0].PingStatus" \
                  --output text 2>/dev/null || echo "None")
                if [ "${STATUS}" != "Online" ]; then
                  echo "Instance ${INST} SSM status: ${STATUS} - not ready yet"
                  SSM_READY=false
                fi
              done
              if [ "${SSM_READY}" = "true" ]; then
                echo "All instances are SSM Online."
                break
              fi
            else
              echo "No InService instances yet..."
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out waiting for SSM-registered instances."
            exit 1
          fi

      - name: Archive application source
        run: |
          tar -czf /tmp/app.tar.gz \
            app/ \
            main.py \
            requirements.txt \
            $([ -d public ] && echo public/ || true)

      - name: Upload application archive to S3
        run: |
          aws s3 cp /tmp/app.tar.gz \
            s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/app.tar.gz

      - name: Run Ansible playbook via SSM Run Command
        run: |
          ASG_NAME="${{ needs.provision.outputs.asg_name }}"
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${ASG_NAME}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          if [ -z "${INSTANCE_IDS}" ]; then
            echo "ERROR: No InService instances found in ASG ${ASG_NAME}"
            exit 1
          fi

          # Build RDS endpoint from Terraform
          cd terraform
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"
          RDS_ENDPOINT=$(terraform output -raw rds_endpoint)
          cd ..

          DB_URL="mysql+aiomysql://appuser:${{ secrets.DB_PASSWORD }}@${RDS_ENDPOINT}/rb1d1"

          PLAYBOOK_CONTENT=$(cat ansible/playbook.yml)
          INSTANCE_IDS_JSON=$(echo "${INSTANCE_IDS}" | tr ' ' '\n' | jq -R . | jq -s . | tr -d '\n')

          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:aws:autoscaling:groupName,Values=${ASG_NAME}" \
            --parameters "commands=[
              \"set -e\",
              \"export DEBIAN_FRONTEND=noninteractive\",
              \"apt-get update -y\",
              \"apt-get install -y python3.11 python3.11-venv python3-pip ansible awscli\",
              \"mkdir -p /opt/app\",
              \"aws s3 cp s3://${{ secrets.TF_STATE_BUCKET }}/${{ secrets.PROJECT_NAME }}/app.tar.gz /tmp/app.tar.gz\",
              \"tar -xzf /tmp/app.tar.gz -C /opt/app\",
              \"cd /opt/app && python3.11 -m venv .venv\",
              \"/opt/app/.venv/bin/pip install --upgrade pip\",
              \"/opt/app/.venv/bin/pip install -r /opt/app/requirements.txt\",
              \"cat > /opt/app/.env <<'ENVEOF'\",
              \"DATABASE_URL=${DB_URL}\",
              \"APP_ENV=production\",
              \"PORT=8000\",
              \"ENVEOF\",
              \"cat > /etc/systemd/system/python-app.service <<'SVCEOF'\",
              \"[Unit]\",
              \"Description=Python FastAPI Application\",
              \"After=network.target\",
              \"\",
              \"[Service]\",
              \"User=ubuntu\",
              \"WorkingDirectory=/opt/app\",
              \"EnvironmentFile=/opt/app/.env\",
              \"ExecStart=/opt/app/.venv/bin/gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:8000\",
              \"Restart=always\",
              \"RestartSec=5\",
              \"\",
              \"[Install]\",
              \"WantedBy=multi-user.target\",
              \"SVCEOF\",
              \"systemctl daemon-reload\",
              \"systemctl enable python-app.service\",
              \"systemctl restart python-app.service"
            ]" \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: ${COMMAND_ID}"

          # Wait for completion
          MAX_WAIT=600
          ELAPSED=0
          INTERVAL=20
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws ssm list-commands \
              --command-id "${COMMAND_ID}" \
              --query "Commands[0].StatusDetails" \
              --output text)
            echo "Command status: ${STATUS}"
            if [ "${STATUS}" = "Success" ]; then
              echo "SSM command completed successfully."
              break
            elif [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              echo "ERROR: SSM command ${STATUS}"
              # Print output for debugging
              for INST in ${INSTANCE_IDS}; do
                echo "--- Output for ${INST} ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INST}" \
                  --query "[StandardOutputContent,StandardErrorContent]" \
                  --output text || true
              done
              exit 1
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ $ELAPSED -ge $MAX_WAIT ]; then
            echo "ERROR: Timed out waiting for SSM command to complete."
            exit 1
          fi

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [configure]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      - name: Get ALB DNS from Terraform output
        id: get_url
        working-directory: terraform
        run: |
          ALB_DNS=$(terraform output -raw alb_dns_name)
          echo "alb_dns=${ALB_DNS}" >> "$GITHUB_OUTPUT"
          echo "app_url=http://${ALB_DNS}" >> "$GITHUB_OUTPUT"

      - name: Wait for ALB and app to be healthy
        run: |-
          APP_URL="${{ steps.get_url.outputs.app_url }}"
          echo "Probing: ${APP_URL}/health/"
          MAX_WAIT=600
          ELAPSED=0
          INTERVAL=20
          SUCCESS=false
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(curl -Lsf -o /dev/null -w "%{http_code}" --connect-timeout 10 --max-time 30 "${APP_URL}/health/" || echo "000")
            echo "HTTP status: ${STATUS} (elapsed: ${ELAPSED}s)"
            if [[ "${STATUS}" =~ ^[23] ]]; then
              SUCCESS=true
              break
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          if [ "${SUCCESS}" != "true" ]; then
            echo "ERROR: App did not become healthy within ${MAX_WAIT}s. Last status: ${STATUS}"
            exit 1
          fi
          echo "App is healthy at ${APP_URL}"
